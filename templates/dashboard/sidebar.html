<aside class="dashboard-sidebar offcanvas offcanvas-lg offcanvas-start" tabindex="-1" id="dashboardSidebar" aria-labelledby="dashboardSidebarLabel">
    <div class="sidebar-inner d-flex flex-column h-100">
        <div class="sidebar-brand-wrap d-flex align-items-center justify-content-between gap-3">
            <a class="sidebar-brand" href="{% url 'dashboard' %}">
                <span class="brand-mark"><i class="bi bi-building-check"></i></span>
                <span>
                    <strong>OnboardHub</strong>
                    <small>Employee Portal</small>
                </span>
            </a>
            <button type="button" class="btn btn-icon d-lg-none" data-bs-dismiss="offcanvas" aria-label="Close sidebar">
                <i class="bi bi-x-lg"></i>
            </button>
        </div>

        <nav class="sidebar-nav mt-4" aria-label="Dashboard navigation">
            <a class="nav-link-item {% if active_nav == 'dashboard' %}active{% endif %}" href="{% url 'dashboard' %}"><i class="bi bi-speedometer2"></i><span>Dashboard</span></a>
            <a class="nav-link-item {% if active_nav == 'profile' %}active{% endif %}" href="{% url 'dashboard_profile' %}"><i class="bi bi-person"></i><span>Profile</span></a>
            <a class="nav-link-item {% if active_nav == 'documents' %}active{% endif %}" href="{% url 'dashboard_documents' %}"><i class="bi bi-folder2-open"></i><span>Documents</span></a>
            <a class="nav-link-item {% if active_nav == 'approval_status' %}active{% endif %}" href="{% url 'dashboard_approval_status' %}"><i class="bi bi-diagram-3"></i><span>Approval Status</span></a>
            <a class="nav-link-item {% if active_nav == 'notifications' %}active{% endif %}" href="{% url 'dashboard_notifications' %}"><i class="bi bi-bell"></i><span>Notifications</span></a>
            <a class="nav-link-item {% if active_nav == 'required_actions' %}active{% endif %}" href="{% url 'dashboard_required_actions' %}"><i class="bi bi-list-task"></i><span>Required Actions</span></a>
            <a class="nav-link-item {% if active_nav == 'settings' %}active{% endif %}" href="{% url 'dashboard_settings' %}"><i class="bi bi-gear"></i><span>Settings</span></a>
        </nav>

        <div class="sidebar-footer mt-auto">
            <div class="profile-summary">
                <div class="avatar-circle avatar-lg">{{ employee_name|default:user.get_username|slice:":1"|upper }}</div>
                <div>
                    <div class="fw-semibold text-white">{{ employee_name|default:user.get_username }}</div>
                    <div class="text-white-50 small">{{ employee_id }} · {{ department }}</div>
                </div>
            </div>
            <form method="post" action="{% url 'logout' %}">
                {% csrf_token %}
                <button type="submit" class="btn btn-logout w-100 d-inline-flex align-items-center justify-content-center gap-2">
                    <i class="bi bi-box-arrow-right"></i>
                    Logout
                </button>
            </form>
        </div>
    </div>
</aside>
